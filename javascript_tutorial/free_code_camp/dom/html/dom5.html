<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM5</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }

      body {
        height: 100vh;
        background: linear-gradient(rgb(39, 39, 77), rgba(5, 5, 29, 0.644));
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        border: 5px solid white;
      }

      main {
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .bigger-container {
        display: flex;
        gap: 0.5rem;
      }

      .container {
        min-width: 9rem;
        min-height: 14rem;
        border: 2px solid white;
        display: flex;
        flex-direction: column;
        justify-content: space-around;
        padding: 1rem;
        border-radius: 0.5rem;
      }

      .sports {
        list-style-type: none;
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .sport {
        color: white;
        font-size: 1.4rem;
        text-align: center;
        border: 1px solid white;
        border-radius: 0.3rem;
      }

      .add-btn {
        align-self: end;
        margin-bottom: 10px;
        padding: 0.7rem;
        border-radius: 0.7rem;
        box-shadow: none;
        background: lightgray;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        font-weight: 500;
        border: none;
        box-shadow: 0 0 2px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="bigger-container">
        <div class="container">
          <ul class="sports">
            <li class="sport1 sport">Football</li>
            <li class="sport2 sport">Basketball</li>
            <li class="sport3 sport">Boxing</li>
            <li class="sport4 sport">Tennis</li>
            <li class="sport5 sport">Golf</li>
          </ul>
        </div>
        <button class="add-btn">Add New Sport</button>
      </div>
    </main>
  </body>
  <script src="../javascript/dom5.js"></script>
</html>

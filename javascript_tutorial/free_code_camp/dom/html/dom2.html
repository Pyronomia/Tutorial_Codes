<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM 2</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }

      body {
        height: 100vh;
        background: linear-gradient(rgb(39, 39, 77), rgba(5, 5, 29, 0.644));
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      main {
        display: flex;
        height: 100%;
        justify-content: center;
        align-items: center;
      }

      .container {
        display: flex;
        flex-direction: column;
        gap: 2.5rem;
      }

      .heading {
        color: white;
        font-size: 2.3rem;
        font-weight: 600;
        line-height: 1;
        text-align: center;
      }

      .examples {
        display: flex;
        gap: 2.5rem;
      }

      .examples > * {
        width: 9rem;
        height: 13rem;
        display: flex;
        flex-direction: column;
        justify-content: space-around;
        align-items: center;
        border: 2px solid white;
        border-radius: 1rem;
      }

      .examples > * > .text-1 {
        color: white;
        font-size: 1.3rem;
        font-weight: 500;
      }

      .examples > * > .text-2 {
        background-color: transparent;
        border: 2px solid white;
        font-size: 0.9 rem;
        border-radius: 0.4rem;
        padding: 0.3rem 0.6rem;
        color: white;
        line-height: 1.2;
        display: flex;
        align-items: center;
        text-align: center;
      }

      .examples > * > .text-2:hover {
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="container">
        <h1 class="heading">Event Listeners</h1>

        <div class="examples">
          <div class="example-1">
            <div class="text-1">Example 1</div>
            <button onclick="alert('I Love JavaScript')" class="text-2">
              Enter
            </button>
          </div>
          <div class="example-2">
            <div class="text-1">Example 2</div>
            <button class="text-2 btn-2">Enter</button>
          </div>
          <div class="example-3">
            <div class="text-1">Example 3</div>
            <button class="text-2 btn-3">Enter</button>
          </div>
        </div>
      </div>
    </main>
  </body>
  <script src="../javascript/dom2.js"></script>
</html>

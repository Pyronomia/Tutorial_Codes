<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM4</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }

      body {
        height: 100vh;
        background: linear-gradient(rgb(39, 39, 77), rgba(5, 5, 29, 0.644));
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        border: 5px solid white;
      }

      main {
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-width: 15rem;
        height: 18rem;
        border: 3px solid white;
        border-radius: 1rem;
      }

      .div-2 {
        color: white;
        font-size: 1.4rem;
        text-align: center;
      }

      .div-1 {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 1.4rem;
        min-width: 8rem;
        height: 8rem;
        border: 2px solid white;
        border-radius: 1rem;
        padding: 1rem;
      }

      .click {
        min-width: 4.5rem;
        font-size: 1rem;
        background: transparent;
        border: 1px solid white;
        border-radius: 0.5rem;
        padding: 0.3rem;
        color: white;
        /* margin: auto; */
      }
    </style>
  </head>
  <body>
    <main>
      <div class="container">
        <div class="div-2">
          2
          <div class="div-1">
            1
            <button class="click">Click</button>
          </div>
        </div>
      </div>
    </main>
  </body>
  <script src="../javascript/dom4.js"></script>
</html>
